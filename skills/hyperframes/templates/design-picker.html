<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design your visual direction</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
    <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js"}}</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0e0e0e;
        color: #eee;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Phase bar ── */
      .phase-bar {
        display: flex;
        border-bottom: 1px solid #1a1a1a;
        padding: 0 20px;
        flex-shrink: 0;
        background: #111;
      }
      .phase-tab {
        padding: 12px 16px;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        letter-spacing: 0.02em;
      }
      .phase-tab.active {
        color: #fff;
        border-bottom-color: #fff;
      }
      .phase-tab.disabled {
        opacity: 0.25;
        pointer-events: none;
      }

      /* ── Phases ── */
      .phase {
        display: none;
        flex: 1;
        height: 100%;
        overflow: auto;
      }
      .phase.active {
        display: flex;
        animation: phaseIn 0.6s ease;
      }
      @keyframes phaseIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ── Phase 1: Mood boards ── */
      .mood-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 420px));
        gap: 16px;
        padding: 20px;
        overflow-y: auto;
        flex: 1;
        align-content: center;
        justify-content: center;
      }
      .mood-card {
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s,
          box-shadow 0.15s;
        background: #141414;
      }
      .mood-card:hover {
        border-color: #333;
        transform: translateY(-1px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }
      .mood-card.selected {
        border-color: #fff;
      }
      .mood-preview {
        aspect-ratio: 16/9;
        overflow: hidden;
        position: relative;
        background: #0a0a0a;
      }
      .mood-frame {
        transform-origin: top left;
        width: 1920px;
        height: 1080px;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 0.25s;
        z-index: 1;
      }
      .mood-frame.active { opacity: 1; }
      .mood-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 50%;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 10;
        -webkit-user-select: none;
        user-select: none;
      }
      .mood-preview:hover .mood-arrow { opacity: 1; }
      .mood-arrow:hover { background: rgba(0,0,0,0.8); border-color: rgba(255,255,255,0.3); }
      .mood-arrow.left { left: 8px; }
      .mood-arrow.right { right: 8px; }
      .mood-dots {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 5px;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .mood-preview:hover .mood-dots { opacity: 1; }
      .mood-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
      }
      .mood-dot.active { background: #fff; }
      .mood-info {
        display: none;
      }
      .mood-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .mood-desc {
        font-size: 11px;
        color: #666;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .mood-tokens {
        display: flex;
        gap: 4px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .mood-token {
        font-size: 9px;
        color: #555;
        background: #1a1a1a;
        padding: 2px 7px;
        border-radius: 3px;
        letter-spacing: 0.02em;
      }

      .mood-header {
        padding: 20px 20px 0;
        flex-shrink: 0;
      }
      .mood-header h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .mood-header p {
        font-size: 12px;
        color: #555;
      }
      .mood-next {
        padding: 12px 20px;
        flex-shrink: 0;
        display: flex;
        justify-content: flex-end;
      }
      .mood-next-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s;
      }
      .mood-next-btn.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .mood-next-btn:hover {
        background: #ddd;
      }

      /* ── Phase 2: Fine-tune ── */
      .panel-left {
        width: 400px;
        min-width: 400px;
        height: 100%;
        overflow-y: auto;
        border-right: 1px solid #1a1a1a;
        padding: 0 0 100px;
        background: #111;
      }
      .panel-right {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        background: #0e0e0e;
      }
      .panel-right > *:not(.showcase) {
        max-width: 100%;
        box-sizing: border-box;
      }
      .showcase *, .showcase *::before, .showcase *::after {
        box-sizing: border-box;
      }
      .scene-frame, .scene-frame * {
        max-width: none !important;
      }

      /* ── Showcase ── */
      .showcase {
        padding: 0;
        --sc-bg: #0e0e0e;
        --sc-fg: #eee;
        --sc-ac: #888;
        --sc-mt: #555;
      }
      .showcase-section {
        padding: 48px 40px;
        border-bottom: 1px solid var(--sc-mt, #1a1a1a);
        background: var(--sc-bg);
        color: var(--sc-fg);
      }
      .showcase-eyebrow {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--sc-ac);
        margin: 0 0 12px;
        font-family: ui-monospace, "SF Mono", monospace;
      }
      .showcase-heading {
        font-size: 22px;
        font-weight: 600;
        color: var(--sc-fg);
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .showcase-lead {
        font-size: 13px;
        line-height: 1.6;
        color: var(--sc-mt);
        margin: 0 0 24px;
        max-width: 600px;
      }

      /* Palette swatches */
      .swatch-grid { display: flex; gap: 12px; flex-wrap: wrap; }
      .swatch-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: rgba(128,128,128,0.06);
        border: 1px solid rgba(128,128,128,0.12);
        border-radius: 8px;
        min-width: 180px;
      }
      .swatch-chip {
        width: 36px;
        height: 36px;
        border-radius: 6px;
        flex-shrink: 0;
        border: 1px solid rgba(128,128,128,0.1);
      }
      .swatch-name { font-size: 13px; font-weight: 600; color: var(--sc-fg); }
      .swatch-hex { font-size: 11px; color: var(--sc-mt); font-family: ui-monospace, monospace; }
      .swatch-role { font-size: 11px; color: var(--sc-mt); margin-top: 2px; opacity: 0.7; }

      /* Type specimens */
      .type-specimen-row {
        display: flex;
        gap: 20px;
        padding: 16px 0;
        border-bottom: 1px solid rgba(128,128,128,0.1);
        align-items: baseline;
      }
      .type-meta {
        width: 120px;
        flex-shrink: 0;
        font-size: 11px;
        color: var(--sc-mt);
        font-family: ui-monospace, monospace;
        line-height: 1.4;
      }
      .type-meta strong { color: var(--sc-ac); display: block; margin-bottom: 2px; }
      .type-sample { flex: 1; color: var(--sc-fg); }

      /* Scene grid */
      .scene-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .specimen-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        margin-top: 12px;
      }
      .specimen-cell {
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        aspect-ratio: 16/9;
        border: 1px solid rgba(128,128,128,0.1);
        background: #111;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .specimen-cell:hover { border-color: rgba(255,255,255,0.3); }
      .specimen-cell.active { border-color: #fff; border-width: 2px; }
      .specimen-cell iframe {
        width: 1920px;
        height: 1080px;
        border: none;
        transform-origin: top left;
        pointer-events: none;
      }
      .specimen-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 4px 8px;
        font-size: 9px;
        color: rgba(255,255,255,0.5);
        background: linear-gradient(transparent, rgba(0,0,0,0.5));
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .scene-cell {
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        aspect-ratio: 16/9;
        border: 1px solid rgba(128,128,128,0.12);
      }
      .scene-cell-label {
        position: absolute;
        top: 6px;
        left: 8px;
        font-size: 9px;
        color: var(--sc-mt);
        font-family: ui-monospace, monospace;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        z-index: 2;
      }
      .scene-frame {
        width: 1920px;
        height: 1080px;
        transform-origin: top left;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Motion preview */
      .ease-preview-track {
        width: 100%;
        height: 48px;
        position: relative;
      }
      .ease-preview-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        position: absolute;
        top: 8px;
        left: 10px;
      }

      /* Elevation */
      .elevation-grid { display: flex; gap: 12px; flex-wrap: wrap; }
      .elevation-card {
        width: 140px;
        height: 80px;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        font-size: 11px;
      }
      .elevation-label { font-size: 10px; color: var(--sc-mt); }

      /* Radius */
      .radius-grid { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
      .radius-chip-preview {
        width: 48px;
        height: 48px;
        border: 1px solid var(--sc-mt);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .radius-label { font-size: 10px; color: var(--sc-mt); text-align: center; margin-top: 4px; font-family: ui-monospace, monospace; }

      .tune-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
        padding: 8px;
        width: 100%;
        max-height: calc(100vh - 45px);
        align-content: center;
      }
      .tune-cell {
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        aspect-ratio: 16/9;
      }
      .tune-frame {
        width: 1920px;
        height: 1080px;
        transform-origin: top left;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* ── Section cards (Neuform-inspired) ── */
      .section-card {
        border-bottom: 1px solid #1a1a1a;
      }
      .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px 6px;
      }
      .section-icon {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-size: 11px;
        flex-shrink: 0;
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.01em;
      }
      .section-meta {
        font-size: 10px;
        color: #444;
        margin-left: auto;
      }
      .section-body {
        padding: 6px 16px 16px;
      }

      .opt-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      /* ── Option cards ── */
      .opt {
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.12s;
        overflow: hidden;
        background: #141414;
        position: relative;
      }
      .opt:hover {
        border-color: #333;
      }
      .opt.selected {
        border-color: #fff;
      }
      .opt-inner {
        padding: 12px 14px;
      }
      .opt-name {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .opt-desc {
        font-size: 10px;
        color: #666;
        line-height: 1.4;
      }
      .opt-tag {
        font-size: 9px;
        color: #444;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .opt-rec {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 8px;
        font-weight: 700;
        color: #4ade80;
        background: rgba(74, 222, 128, 0.08);
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ── Palette option ── */
      .pal-strip {
        display: flex;
        height: 28px;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .pal-strip > div {
        flex: 1;
      }
      .pal-ramp {
        display: flex;
        gap: 2px;
        margin-top: 4px;
      }
      .pal-ramp-swatch {
        width: 100%;
        height: 6px;
        border-radius: 2px;
      }

      /* ── Type option (specimen) ── */
      .type-specimen {
        padding: 14px;
        border-bottom: 1px solid #1a1a1a;
      }
      .type-headline {
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }
      .type-body {
        line-height: 1.5;
        color: #666;
        font-size: 11px;
      }
      .type-meta {
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .type-families {
        font-size: 9px;
        color: #444;
        letter-spacing: 0.02em;
      }
      .type-letters {
        font-size: 9px;
        color: #333;
        letter-spacing: 0.08em;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        max-width: 200px;
      }

      /* ── Chip options ── */
      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .chip {
        border: 1px solid #1e1e1e;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        transition: border-color 0.12s;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #141414;
      }
      .chip:hover {
        border-color: #333;
      }
      .chip.selected {
        border-color: #fff;
      }
      .chip-label {
        font-size: 11px;
        font-weight: 500;
      }
      .chip-sub {
        font-size: 9px;
        color: #555;
      }
      .chip-preview {
        flex-shrink: 0;
      }

      .theme-chip {
        flex: 1;
        min-width: 90px;
        flex-direction: column;
        align-items: center;
        padding: 10px 12px;
        text-align: center;
      }
      .theme-swatch {
        width: 100%;
        height: 28px;
        border-radius: 4px;
        margin-bottom: 4px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .corner-box {
        width: 22px;
        height: 22px;
        border: 2px solid #666;
      }
      .density-bars {
        display: flex;
        flex-direction: column;
        width: 24px;
      }
      .density-bar {
        background: #666;
        height: 3px;
        border-radius: 1px;
      }
      .depth-square {
        width: 22px;
        height: 22px;
        background: #2a2a2a;
        border-radius: 3px;
      }

      /* ── Easing option ── */
      .ease-opt {
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: border-color 0.12s;
        overflow: hidden;
        background: #141414;
        padding: 10px 14px;
      }
      .ease-opt:hover {
        border-color: #333;
      }
      .ease-opt.selected {
        border-color: #fff;
      }
      .ease-track {
        position: relative;
        height: 8px;
        background: #1a1a1a;
        border-radius: 4px;
        margin-bottom: 8px;
        overflow: visible;
      }
      .ease-dot {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
      }
      .ease-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ease-name {
        font-size: 11px;
        font-weight: 600;
      }
      .ease-value {
        font-size: 9px;
        color: #444;
        font-family: "SF Mono", Consolas, monospace;
        letter-spacing: 0.02em;
      }
      #shader-editor input[type="color"] {
        padding: 0;
        border-radius: 4px;
        cursor: pointer;
      }
      .bezier-editor {
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        margin-bottom: 6px;
        cursor: pointer;
        background: #141414;
        padding: 14px;
        transition: border-color 0.12s;
      }
      .bezier-editor:hover { border-color: #333; }
      .bezier-editor.selected { border-color: #fff; }
      .bezier-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .bezier-header .ease-name { font-size: 11px; font-weight: 600; }
      .bezier-header .ease-value {
        font-size: 9px;
        color: #444;
        font-family: "SF Mono", Consolas, monospace;
      }
      .bezier-canvas-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        overflow: visible;
        cursor: crosshair;
      }
      .bezier-canvas-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .bezier-handle {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid #4e7fff;
        background: #0e0e0e;
        cursor: grab;
        transform: translate(-50%, -50%);
        z-index: 2;
      }
      .bezier-handle:hover, .bezier-handle.dragging {
        background: #4e7fff;
        cursor: grabbing;
      }
      .bezier-anchor {
        position: absolute;
        width: 12px;
        height: 12px;
        border: 2px solid #4e7fff;
        background: #fff;
        cursor: grab;
        transform: translate(-50%, -50%) rotate(45deg);
        z-index: 3;
      }
      .bezier-anchor:hover, .bezier-anchor.dragging {
        background: #4e7fff;
        cursor: grabbing;
      }
      .bezier-anchor.selected {
        background: #4e7fff;
      }
      .bezier-hint {
        font-size: 9px;
        color: #555;
        margin-top: 6px;
        line-height: 1.3;
      }
      .bezier-track {
        position: relative;
        height: 8px;
        background: #1a1a1a;
        border-radius: 4px;
        margin-top: 10px;
        overflow: visible;
      }
      .bezier-dot {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
      }

      .preview-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #2a2a2a;
        font-size: 13px;
      }

      /* ── FAB + Overlay ── */
      .fab {
        position: fixed;
        bottom: 20px;
        right: 32px;
        transform: translateY(60px);
        opacity: 0;
        background: #fff;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.25s ease,
          opacity 0.25s ease;
        z-index: 100;
      }
      .fab.visible {
        transform: translateY(0);
        opacity: 1;
      }
      .fab:hover {
        background: #ddd;
      }

  <body>

    <script>
      var ARCHITECTURES = __ARCHITECTURES_JSON__;
      var PALETTES = __PALETTES_JSON__;
      var TYPEPAIRS = __TYPEPAIRS_JSON__;
      var MOODBOARDS = __MOODBOARDS_JSON__;
      var PROMPT = __PROMPT_JSON__;
      var ALL_TEMPLATES = __TEMPLATES_JSON__;
      var PROMPT_TEXT = __PROMPT_TEXT_JSON__;
      var picks = {
        theme: null,
        arch: null,
        palette: null,
        type: null,
        corners: null,
        density: null,
        depth: null,
        easing: null,
        bg_mode: null,
      };

      var EASINGS = [
        { name: "Confident", value: "power3.out", desc: "Fast start, smooth deceleration" },
        { name: "Snappy", value: "expo.out", desc: "Very fast start, crisp stop" },
        { name: "Gentle", value: "sine.inOut", desc: "Soft acceleration and deceleration" },
        { name: "Bouncy", value: "back.out(1.4)", desc: "Overshoots then settles" },
        { name: "Elastic", value: "elastic.out(1, 0.5)", desc: "Springs past target and wobbles" },
        { name: "Sharp", value: "power4.out", desc: "Aggressive start, hard stop" },
      ];

      var THEMES = [
        { name: "Dark", id: "dark", bg: "#0e0e0e", fg: "#eee", desc: "Light on dark" },
        { name: "Light", id: "light", bg: "#f5f3ef", fg: "#1a1a1a", desc: "Dark on light" },
        { name: "Palette", id: "palette", bg: null, fg: null, desc: "Use palette colors" },
      ];
      var CORNERS = [
        { name: "Sharp", value: "0px" },
        { name: "Slight", value: "4px" },
        { name: "Rounded", value: "12px" },
      ];
      var DENSITIES = [
        { name: "Tight", padding: "8-12px", gap: "8-12px", desc: "Compact" },
        { name: "Normal", padding: "16-24px", gap: "16-20px", desc: "Balanced" },
        { name: "Generous", padding: "32-48px", gap: "28-40px", desc: "Spacious" },
      ];
      var DEPTHS = [
        { name: "Flat", desc: "No shadows" },
        { name: "Subtle", desc: "Faint shadows" },
        { name: "Layered", desc: "Glows + depth" },
      ];

      // Load fonts
      var fams = [];
      TYPEPAIRS.forEach(function (tp) {
        fams.push(tp.headline.family.replace(/ /g, "+") + ":wght@" + tp.headline.weight);
        fams.push(tp.body.family.replace(/ /g, "+") + ":wght@" + tp.body.weight);
      });
      var lnk = document.createElement("link");
      lnk.rel = "stylesheet";
      lnk.href =
        "https://fonts.googleapis.com/css2?family=" + fams.join("&family=") + "&display=swap";
      document.head.appendChild(lnk);

      function al(hex, o) {
        if (!hex || typeof hex !== "string" || hex[0] !== "#") return "rgba(128,128,128," + o + ")";
        if (hex.length === 4) hex = "#" + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
        var r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
        if (isNaN(r)) r = 128;
        if (isNaN(g)) g = 128;
        if (isNaN(b)) b = 128;
        return "rgba(" + r + "," + g + "," + b + "," + o + ")";
      }

      // Prompt-aware UI
      if (PROMPT && PROMPT.title) {
        var _mt = document.getElementById("mood-title");
        if (_mt) _mt.textContent = "Pick a direction for: " + PROMPT.title;
      }

      // ── Phase 1: Mood boards + Palette bar ──
      var moodGrid = document.getElementById("mood-grid") || document.createElement("div");
      var selectedMood = null;
      var overridePalette = null;

      // Build palette bar
      var palBar = document.getElementById("pal-bar") || document.createElement("div");
      PALETTES.forEach(function (p, i) {
        var chip = document.createElement("div");
        chip.className = "pal-bar-chip";
        chip.innerHTML =
          '<div class="pal-bar-chip-swatches"><div class="pal-bar-chip-swatch" style="background:' +
          p.primary +
          ';border:1px solid rgba(255,255,255,0.08);"></div><div class="pal-bar-chip-swatch" style="background:' +
          p.secondary +
          ';"></div><div class="pal-bar-chip-swatch" style="background:' +
          p.tertiary +
          ';"></div><div class="pal-bar-chip-swatch" style="background:' +
          p.accent +
          ';border:1px solid rgba(255,255,255,0.08);"></div></div><span class="pal-bar-chip-name">' +
          p.name +
          "</span>";
        chip.onclick = function () {
          palBar.querySelectorAll(".pal-bar-chip").forEach(function (c) {
            c.classList.remove("active");
          });
          if (overridePalette === i) {
            overridePalette = null;
          } else {
            chip.classList.add("active");
            overridePalette = i;
          }
          renderMoodBoards();
        };
        palBar.appendChild(chip);
      });

      function renderMoodBoards() {
        var prevSelected = selectedMood;
        moodGrid.innerHTML = "";
        MOODBOARDS.forEach(function (mb, i) {
          var card = document.createElement("div");
          card.className = "mood-card" + (i === prevSelected ? " selected" : "");
          var tp = TYPEPAIRS[mb.type_index || 0],
            arch = ARCHITECTURES[mb.arch_index || 0];
          var pal =
            overridePalette !== null ? PALETTES[overridePalette] : PALETTES[mb.palette_index || 0];
          var thId = mb.theme || "dark",
            th =
              THEMES.find(function (t) {
                return t.id === thId;
              }) || THEMES[0];
          var bg = thId === "palette" ? pal.background : th.bg,
            fg = thId === "palette" ? pal.foreground : th.fg;
          var tokens = {
            "{{bg}}": bg,
            "{{fg}}": fg,
            "{{ac}}": pal.accent,
            "{{mt}}": pal.muted || pal.mid || al(fg, 0.4),
            "{{hf}}": tp.headline.family,
            "{{hw}}": tp.headline.weight,
            "{{bf}}": tp.body.family,
            "{{bw}}": tp.body.weight,
            "{{cr}}": mb.corners || "4px",
            "{{pad}}": mb.padding || "20px",
            "{{gap}}": mb.gap || "16px",
            "{{shadow}}": mb.shadow || "none",
            "{{sf}}": al(fg, 0.06),
            "{{g}}": al(fg, 0.06),
            "{{fg3}}": al(fg, 0.03),
            "{{fg6}}": al(fg, 0.06),
            "{{fg8}}": al(fg, 0.08),
            "{{fg15}}": al(fg, 0.15),
            "{{ac3}}": al(pal.accent, 0.03),
            "{{ac5}}": al(pal.accent, 0.05),
            "{{ac25}}": al(pal.accent, 0.25),
            "{{prompt_headline}}": (PROMPT && PROMPT.headline) || "Your Headline",
            "{{prompt_sub}}": (PROMPT && PROMPT.subline) || "A subline for your product.",
          };
          var frames = arch.preview_frames || [arch.preview_html || ""];
          var framesHtml = frames.map(function (f, fi) {
            var resolved = f || "";
            Object.keys(tokens).forEach(function (k) {
              resolved = resolved.split(k).join(tokens[k]);
            });
            return '<div class="mood-frame' + (fi === 0 ? ' active' : '') + '">' + resolved + '</div>';
          }).join("");
          var dotsHtml = frames.length > 1 ? '<div class="mood-dots">' + frames.map(function (_, di) {
            return '<div class="mood-dot' + (di === 0 ? ' active' : '') + '"></div>';
          }).join("") + '</div>' : '';
          var arrowsHtml = frames.length > 1 ? '<div class="mood-arrow left">‹</div><div class="mood-arrow right">›</div>' : '';
          card.innerHTML = '<div class="mood-preview" style="background:' + bg + ';">' + framesHtml + arrowsHtml + dotsHtml + '</div>';

          if (frames.length > 1) {
            (function(cardEl, count) {
              var idx = 0;
              var prev = cardEl.querySelector('.mood-preview');
              function show(n) {
                idx = (n + count) % count;
                prev.querySelectorAll('.mood-frame').forEach(function(f,fi) { f.classList.toggle('active', fi === idx); });
                prev.querySelectorAll('.mood-dot').forEach(function(d,di) { d.classList.toggle('active', di === idx); });
              }
              prev.querySelector('.mood-arrow.left').onclick = function(e) { e.stopPropagation(); show(idx - 1); };
              prev.querySelector('.mood-arrow.right').onclick = function(e) { e.stopPropagation(); show(idx + 1); };
            })(card, frames.length);
          }
          card.onclick = function () {
            moodGrid.querySelectorAll(".mood-card").forEach(function (c) {
              c.classList.remove("selected");
            });
            card.classList.add("selected");
            selectedMood = i;
            var _mnb = document.getElementById("mood-next-btn"); if (_mnb) _mnb.classList.add("visible");
          };
          moodGrid.appendChild(card);
        });
        scaleMoodPreviews();
      }
      renderMoodBoards();

          if (matches) matches.forEach(function(m) {
            var parts = m.replace("family=", "").split(":");
            var family = decodeURIComponent(parts[0]).replace(/\+/g, " ");
            var weight = 400;
            if (parts[1]) {
              var wMatch = parts[1].match(/(\d{3,4})/);
              if (wMatch) weight = parseInt(wMatch[1]);
            }
            fonts.push({ family: family, weight: weight });
          });
        });
        // Also check inline @font-face or font-family in stylesheets

          doc.querySelectorAll("style").forEach(function(st) {
            var ff = st.textContent.match(/font-family:\s*['"]([^'"]+)['"]/g);

      // ── Custom Ease Editor (GSAP CustomEase, multi-waypoint) ──
      (function() {
        var customIdx = EASINGS.length;
        var initPath = "M0,0 C0.126,0.382 0.282,0.674 0.44,0.822 0.632,1.002 0.818,1.001 1,1";
        EASINGS.push({ name: "Custom", value: initPath, desc: "Click curve to add points, drag to shape" });
        if (typeof CustomEase !== "undefined") { gsap.registerPlugin(CustomEase); CustomEase.create("_pickerCustom", initPath); }

        // Anchors: [{x,y,ox,oy,ix,iy}] — ox/oy = outgoing handle, ix/iy = incoming handle (absolute coords, 0-1 normalized, y=0 is bottom)
        var anchors = [
          { x: 0, y: 0, ox: 0.126, oy: 0.382, ix: 0, iy: 0 },
          { x: 0.44, y: 0.822, ox: 0.632, oy: 1.002, ix: 0.282, iy: 0.674 },
          { x: 1, y: 1, ox: 1, oy: 1, ix: 0.818, iy: 1.001 }
        ];
        var selectedAnchor = -1;

        var wrap = document.createElement("div");
        wrap.className = "bezier-editor";
        wrap.innerHTML =
          '<div class="bezier-header"><div class="ease-name">Custom</div><div class="ease-value" id="bezier-value" style="font-size:8px;word-break:break-all;max-height:28px;overflow:hidden;">' + initPath + '</div></div>' +
          '<div class="bezier-canvas-wrap" id="bezier-wrap"><canvas id="bezier-canvas"></canvas></div>' +
          '<div class="bezier-hint">Click curve to add point · Select + Delete to remove · Drag handles to shape</div>' +
          '<div class="bezier-track"><div class="bezier-dot" id="bezier-dot"></div></div>';

        wrap.addEventListener("click", function(e) {
          if (e.target.closest(".bezier-canvas-wrap") || e.target.closest(".bezier-anchor") || e.target.closest(".bezier-handle")) return;
          selectCustom();
        });
        easeOpts.appendChild(wrap);

        var canvas = document.getElementById("bezier-canvas");
        var bwrap = document.getElementById("bezier-wrap");
        var valEl = document.getElementById("bezier-value");
        var dotEl = document.getElementById("bezier-dot");
        var handles = []; // DOM elements for handles/anchors

        function selectCustom() {
          easeOpts.querySelectorAll(".ease-opt").forEach(function(c) { c.classList.remove("selected"); });
          wrap.classList.add("selected");
          picks.easing = customIdx;
          checkReady();
          renderPreview();
        }

        // Convert anchors to SVG path (CustomEase: y=0 is start, y=1 is end — same as our internal coords)
        function toPath() {
          var d = "M0,0";
          for (var i = 0; i < anchors.length - 1; i++) {
            var a = anchors[i], b = anchors[i + 1];
            d += " C" + n(a.ox) + "," + n(a.oy) + " " + n(b.ix) + "," + n(b.iy) + " " + n(b.x) + "," + n(b.y);
          }
          return d;
        }
        function n(v) { return parseFloat(v.toFixed(3)); }

        // De Casteljau split
        function splitBezier(p0, cp1, cp2, p1, t) {
          var u = 1 - t;
          var q0 = lerp(p0, cp1, t), q1 = lerp(cp1, cp2, t), q2 = lerp(cp2, p1, t);
          var r0 = lerp(q0, q1, t), r1 = lerp(q1, q2, t);
          var s = lerp(r0, r1, t);
          return { left: { cp1: q0, cp2: r0, end: s }, right: { cp1: r1, cp2: q2, end: p1 } };
        }
        function lerp(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }

        // Find closest point on curve to click
        function closestOnCurve(mx, my) {
          var best = { dist: Infinity, seg: 0, t: 0.5 };
          for (var i = 0; i < anchors.length - 1; i++) {
            var a = anchors[i], b = anchors[i + 1];
            var p0 = { x: a.x, y: a.y }, cp1 = { x: a.ox, y: a.oy }, cp2 = { x: b.ix, y: b.iy }, p1 = { x: b.x, y: b.y };
            for (var t = 0; t <= 1; t += 0.01) {
              var u = 1 - t;
              var px = u*u*u*p0.x + 3*u*u*t*cp1.x + 3*u*t*t*cp2.x + t*t*t*p1.x;
              var py = u*u*u*p0.y + 3*u*u*t*cp1.y + 3*u*t*t*cp2.y + t*t*t*p1.y;
              var dx = px - mx, dy = py - my;
              var d = dx * dx + dy * dy;
              if (d < best.dist) { best.dist = d; best.seg = i; best.t = t; }
            }
          }
          return best;
        }

        // Add waypoint
        function addWaypoint(seg, t) {
          var a = anchors[seg], b = anchors[seg + 1];
          var p0 = { x: a.x, y: a.y }, cp1 = { x: a.ox, y: a.oy }, cp2 = { x: b.ix, y: b.iy }, p1 = { x: b.x, y: b.y };
          var sp = splitBezier(p0, cp1, cp2, p1, t);
          a.ox = sp.left.cp1.x; a.oy = sp.left.cp1.y;
          var newAnchor = {
            x: sp.left.end.x, y: sp.left.end.y,
            ix: sp.left.cp2.x, iy: sp.left.cp2.y,
            ox: sp.right.cp1.x, oy: sp.right.cp1.y
          };
          b.ix = sp.right.cp2.x; b.iy = sp.right.cp2.y;
          anchors.splice(seg + 1, 0, newAnchor);
          selectedAnchor = seg + 1;
          rebuild();
          updateValue();
        }

        // Remove waypoint
        function removeWaypoint(idx) {
          if (idx <= 0 || idx >= anchors.length - 1) return;
          anchors.splice(idx, 1);
          selectedAnchor = -1;
          rebuild();
          updateValue();
        }

        // Rebuild handle DOM elements
        function rebuild() {
          handles.forEach(function(h) { if (h.el.parentNode) h.el.parentNode.removeChild(h.el); });
          handles = [];
          for (var i = 0; i < anchors.length; i++) {
            var a = anchors[i];
            // Anchor point (not for first/last x position, but y is draggable)
            if (i > 0 && i < anchors.length - 1) {
              makeHandle(i, "anchor", "x", "y", true, true);
            }
            // Outgoing handle (not for last anchor)
            if (i < anchors.length - 1) {
              makeHandle(i, "out", "ox", "oy", true, true);
            }
            // Incoming handle (not for first anchor)
            if (i > 0) {
              makeHandle(i, "in", "ix", "iy", true, true);
            }
          }
          draw();
        }

        function makeHandle(idx, type, xk, yk, dragX, dragY) {
          var el = document.createElement("div");
          el.className = type === "anchor" ? "bezier-anchor" : "bezier-handle";
          el.dataset.idx = idx;
          el.dataset.type = type;
          bwrap.appendChild(el);
          var info = { el: el, idx: idx, type: type, xk: xk, yk: yk };
          handles.push(info);

          var dragging = false;
          el.addEventListener("mousedown", function(e) {
            e.preventDefault(); e.stopPropagation();
            dragging = true;
            el.classList.add("dragging");
            selectCustom();
            if (type === "anchor") {
              selectedAnchor = idx;
              handles.forEach(function(h) { if (h.type === "anchor") h.el.classList.toggle("selected", h.idx === idx); });
            }
          });
          window.addEventListener("mousemove", function(e) {
            if (!dragging) return;
            var r = bwrap.getBoundingClientRect();
            var nx = (e.clientX - r.left) / r.width;
            var ny = 1 - (e.clientY - r.top) / r.height;
            if (type === "anchor") {
              var prev = anchors[idx - 1], next = anchors[idx + 1];
              nx = Math.max(prev.x + 0.01, Math.min(next.x - 0.01, nx));
              var dx = nx - anchors[idx].x, dy = ny - anchors[idx].y;
              anchors[idx].x = nx; anchors[idx].y = ny;
              anchors[idx].ox += dx; anchors[idx].oy += dy;
              anchors[idx].ix += dx; anchors[idx].iy += dy;
            } else {
              anchors[idx][xk] = nx;
              anchors[idx][yk] = ny;
            }
            draw();
            updateValue();
          });
          window.addEventListener("mouseup", function() {
            if (dragging) { dragging = false; el.classList.remove("dragging"); }
          });
        }

        // Canvas click to add waypoint
        bwrap.addEventListener("click", function(e) {
          if (e.target.classList.contains("bezier-handle") || e.target.classList.contains("bezier-anchor")) return;
          var r = bwrap.getBoundingClientRect();
          var mx = (e.clientX - r.left) / r.width;
          var my = 1 - (e.clientY - r.top) / r.height;
          var hit = closestOnCurve(mx, my);
          if (hit.dist < 0.005) {
            addWaypoint(hit.seg, hit.t);
          } else {
            selectedAnchor = -1;
            handles.forEach(function(h) { if (h.type === "anchor") h.el.classList.remove("selected"); });
          }
        });

        // Delete key removes selected waypoint
        document.addEventListener("keydown", function(e) {
          if ((e.key === "Delete" || e.key === "Backspace") && selectedAnchor > 0 && selectedAnchor < anchors.length - 1) {
            if (document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA")) return;
            e.preventDefault();
            removeWaypoint(selectedAnchor);
          }
        });

        function draw() {
          var r = bwrap.getBoundingClientRect();
          canvas.width = r.width * 2; canvas.height = r.height * 2;
          var ctx = canvas.getContext("2d");
          var w = canvas.width, ht = canvas.height;
          ctx.clearRect(0, 0, w, ht);

          // Grid
          ctx.strokeStyle = "rgba(255,255,255,0.04)"; ctx.lineWidth = 1;
          for (var g = 0.25; g < 1; g += 0.25) {
            ctx.beginPath(); ctx.moveTo(g*w, 0); ctx.lineTo(g*w, ht); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, g*ht); ctx.lineTo(w, g*ht); ctx.stroke();
          }
          // Diagonal
          ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.setLineDash([6, 6]);
          ctx.beginPath(); ctx.moveTo(0, ht); ctx.lineTo(w, 0); ctx.stroke(); ctx.setLineDash([]);

          // Handle lines
          ctx.strokeStyle = "rgba(78,127,255,0.3)"; ctx.lineWidth = 1.5;
          for (var i = 0; i < anchors.length; i++) {
            var a = anchors[i];
            if (i < anchors.length - 1) {
              ctx.beginPath(); ctx.moveTo(a.x*w, (1-a.y)*ht); ctx.lineTo(a.ox*w, (1-a.oy)*ht); ctx.stroke();
            }
            if (i > 0) {
              ctx.beginPath(); ctx.moveTo(a.x*w, (1-a.y)*ht); ctx.lineTo(a.ix*w, (1-a.iy)*ht); ctx.stroke();
            }
          }

          // Curve
          ctx.strokeStyle = "#0ae448"; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(0, ht);
          for (var i = 0; i < anchors.length - 1; i++) {
            var a = anchors[i], b = anchors[i + 1];
            ctx.bezierCurveTo(a.ox*w, (1-a.oy)*ht, b.ix*w, (1-b.iy)*ht, b.x*w, (1-b.y)*ht);
          }
          ctx.stroke();

          // Position handle DOM elements
          handles.forEach(function(h) {
            var a = anchors[h.idx];
            var px = a[h.xk] * r.width, py = (1 - a[h.yk]) * r.height;
            h.el.style.left = px + "px"; h.el.style.top = py + "px";
          });
        }

        function updateValue() {
          var path = toPath();
          EASINGS[customIdx].value = path;
          valEl.textContent = path;
          if (typeof CustomEase !== "undefined") { CustomEase.create("_pickerCustom", path); }
          if (picks.easing === customIdx) { animateBezierDot(); renderPreview(); }
        }

        var bzTween = null;
        function animateBezierDot() {
          if (bzTween) { bzTween.kill(); bzTween = null; }
          if (typeof CustomEase === "undefined") return;
          bzTween = gsap.fromTo(dotEl, { left: 0 }, {
            left: "calc(100% - 12px)", duration: 1.2,
            ease: "_pickerCustom", repeat: -1, repeatDelay: 0.5, yoyo: true
          });
        }

        rebuild();
        setTimeout(function() { draw(); animateBezierDot(); }, 100);
        window.addEventListener("resize", function() { draw(); });
      })();

      // ── Background / Three.js Gradient Presets ──

      // ── Output ──

      function showOutput() {
        if (picks.theme === null || picks.arch === null || picks.palette === null || picks.type === null || picks.corners === null || picks.density === null || picks.depth === null) return;
        var a = ARCHITECTURES[picks.arch], p = PALETTES[picks.palette], t = TYPEPAIRS[picks.type];
        var th = THEMES[picks.theme], cr = CORNERS[picks.corners], dn = DENSITIES[picks.density], dp = DEPTHS[picks.depth];
        var bg = th.id === "palette" && p.secondary ? p.secondary : th.bg;

        var bgpObj = (picks.bg_mode > 0 && BG_PRESETS[picks.bg_mode]) ? BG_PRESETS[picks.bg_mode] : null;
        var bgColors = bgpObj ? getBgColors() : [];

        var spec = {
          name: (PROMPT && PROMPT.title) || "Untitled",
          palette: { canvas: bg, text: fg, accent: ac, muted: mt },
          typography: {
            headline: { family: t.headline.family, weight: t.headline.weight },

          motion: easeObj ? { easing: easeObj.value, energy: easeObj.name.toLowerCase(), desc: easeObj.desc } : null,
          background: bgpObj ? {

            position: [bgpObj.posX || 0, bgpObj.posY || 0, bgpObj.posZ || 0]
          } : null,
          structure: { name: a.name, tag: a.tag || "", mood: a.mood || "", description: a.description || "" },
          density: { level: dn.name, desc: dn.desc },

        var h = '<!doctype html>\n<html lang="en">\n<head>\n';

        h += '<style>\n:root {\n';
        h += '  --bg: ' + bg + ';\n  --fg: ' + fg + ';\n  --accent: ' + ac + ';\n  --muted: ' + mt + ';\n';
        h += '  --font-headline: "' + t.headline.family + '", serif;\n  --font-headline-weight: ' + t.headline.weight + ';\n';
        h += '  --font-body: "' + t.body.family + '", sans-serif;\n  --font-body-weight: ' + t.body.weight + ';\n';
        h += '  --corner-radius: ' + cr.value + ';\n  --padding: ' + padVal + ';\n  --gap: ' + gapVal + ';\n';
        h += '  --shadow: ' + spec.surface.shadow + ';\n';
        if (easeObj) h += '  --easing: ' + easeObj.value + ';\n';
        h += '}\n';
        h += 'body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-weight:var(--font-body-weight);}\n';
        h += '</style>\n';
        if (bgpObj) {
          h += '<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"><\/script>\n';
          h += '<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js"}}<\/script>\n';
        }
        h += '</head>\n<body>\n\n';

        // Machine-readable spec
        h += '<script type="application/json" id="design-spec">\n';
        h += JSON.stringify(spec, null, 2) + '\n';
        h += '<\/script>\n\n';

        // Shader background module (if selected)
        if (bgpObj) {
          h += '<!-- Working Three.js shader background — copy this script into compositions -->\n';
          h += '<canvas id="design-bg" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;"><\/canvas>\n';
          h += '<script type="module" id="design-background">\n';
          h += 'import * as THREE from "three";\n';
          h += 'const spec = JSON.parse(document.getElementById("design-spec").textContent);\n';
          h += 'const bg = spec.background;\n';
          h += 'if (bg) {\n';
          h += '  const canvas = document.getElementById("design-bg");\n';
          h += '  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});\n';
          h += '  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));\n';
          h += '  const scene = new THREE.Scene();\n';
          h += '  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);\n';
          h += '  const isSphere = bg.type === "sphere";\n';
          h += '  const dist = isSphere ? 14 : bg.camera.distance;\n';
          h += '  const az = bg.camera.azimuth * Math.PI / 180;\n';
          h += '  const pol = bg.camera.polar * Math.PI / 180;\n';
          h += '  camera.position.set(dist*Math.sin(pol)*Math.sin(az), dist*Math.cos(pol), dist*Math.sin(pol)*Math.cos(az));\n';
          h += '  camera.lookAt(0,0,0);\n';
          h += '  camera.zoom = isSphere ? bg.camera.zoom : 1;\n';
          h += '  camera.updateProjectionMatrix();\n';
          h += '  scene.add(new THREE.AmbientLight(0xffffff, 0.6));\n';

          var _sg = window._sgShaders || {};
          var vtxSrc = (_sg.vertex || '').replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
          h += '  const vertexShader = `' + vtxSrc + '`;\n\n';

          var fragSrc = bgpObj.fragmentShader || (_sg[bgpObj.shader]) || (_sg.defaults) || '';
          h += '  const fragmentShader = `' + fragSrc.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$') + '`;\n';

          h += '\n  const uniforms = {\n';
          h += '    uTime:{value:0}, uSpeed:{value:' + bgpObj.speed + '}, uDensity:{value:' + bgpObj.density + '}, uStrength:{value:' + bgpObj.strength + '},\n';
          h += '    uColor1:{value:new THREE.Color("' + bgColors[0] + '")},\n';
          h += '    uColor2:{value:new THREE.Color("' + bgColors[1] + '")},\n';
          h += '    uColor3:{value:new THREE.Color("' + bgColors[2] + '")}\n';
          h += '  };\n';
          h += '  const material = new THREE.ShaderMaterial({vertexShader, fragmentShader, uniforms, side:THREE.DoubleSide});\n';
          h += '  const geometry = isSphere ? new THREE.SphereGeometry(1,256,256) : new THREE.PlaneGeometry(10,10,128,128);\n';
          h += '  const mesh = new THREE.Mesh(geometry, material);\n';
          h += '  mesh.rotation.set(' + (bgpObj.rotX*Math.PI/180).toFixed(3) + ',' + (bgpObj.rotY*Math.PI/180).toFixed(3) + ',' + (bgpObj.rotZ*Math.PI/180).toFixed(3) + ');\n';
          h += '  mesh.position.set(' + (bgpObj.posX||0) + ',' + (bgpObj.posY||0) + ',' + (bgpObj.posZ||0) + ');\n';
          h += '  scene.add(mesh);\n\n';
          h += '  function renderAt(time){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();uniforms.uTime.value=time;renderer.render(scene,camera);}\n';
          h += '  window.addEventListener("hf-seek",e=>renderAt(e.detail.time));\n';
          h += '  renderAt(window.__hfThreeTime||0);\n';
          h += '}\n';
          h += '<\/script>\n\n';
        }

        h += '</body>\n</html>';

        document.getElementById("md-output").value = h;

      function tpOnIframeLoad(slug, ifr) {
        if (!ifr.contentDocument) return;
        var doc = ifr.contentDocument;
        var win = ifr.contentWindow;
        doc.querySelectorAll("script").forEach(function(s) { s.remove(); });

        var ds = doc.querySelector("deck-stage");
        if (ds) {
          var dsStyle = doc.createElement("style");
          dsStyle.textContent = "deck-stage{display:block;width:1920px;height:1080px;position:relative;overflow:hidden;}deck-stage>section{position:absolute;top:0;left:0;width:100%;height:100%;visibility:hidden;opacity:0;}deck-stage>section:first-child{visibility:visible;opacity:1;}";
          doc.head.appendChild(dsStyle);
        }

        // Universal slide override: force absolute positioning so all templates behave the same
        var overrideStyle = doc.createElement("style");
        overrideStyle.id = "tp-slide-override";
        overrideStyle.textContent =
          ".deck, .slide-deck, .slides-container, deck-stage { width: 100% !important; height: 100% !important; transform: none !important; position: relative !important; overflow: hidden !important; }" +
          ".slide, section.slide, div.slide, deck-stage > section { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; min-height: 0 !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }" +
          ".slide.active, section.slide.active, div.slide.active, deck-stage > section.active { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; }";
        doc.head.appendChild(overrideStyle);
        doc.body.style.overflow = "hidden";
        doc.documentElement.style.overflow = "hidden";

        var slides = doc.querySelectorAll("section.slide, div.slide, .slide, deck-stage > section");
        if (slides.length > 0) {
          slides.forEach(function(s, i) { if (i === 0) s.classList.add("active"); else s.classList.remove("active"); });
          slides[0].querySelectorAll("*").forEach(function(el) {
            try {
              var cs = win.getComputedStyle(el);
              if (cs.opacity === "0" && cs.display !== "none") el.style.opacity = "1";
            } catch(e) {}
          });
        }

        tpScaleIframe(ifr);
        if (tpActivePal > 0) tpApplyAllPalettes();
      }

      function tpScaleIframe(ifr) {
        var cprev = ifr.closest(".cprev");
        if (!cprev) return;
        var w = cprev.offsetWidth;
        if (w > 0) ifr.style.transform = "scale(" + (w / 1920) + ")";
      }

      function tpScaleAllIframes() {
        document.querySelectorAll("#tp-grid iframe").forEach(tpScaleIframe);
      }
      window.addEventListener("resize", tpScaleAllIframes);

      var _heroAnimTimeline = null;
      function tpPreloadGsap(ifr) {
        // GSAP runs in parent — no iframe injection needed
      }

      function tpAnimateHero(easeObj) {
        if (_heroAnimTimeline) { _heroAnimTimeline.kill(); _heroAnimTimeline = null; }
        var heroIfr = document.querySelector("#sc-scene-grid iframe");
        if (!heroIfr || !heroIfr.contentDocument) return;
        if (typeof gsap === "undefined") return;
        _runHeroAnim(heroIfr.contentDocument, easeObj);
      }

      var _heroAnimEls = [];
      function _runHeroAnim(doc, easeObj) {
        var isCustom = easeObj.value.indexOf("M") === 0;
        var ease;
        if (isCustom && typeof CustomEase !== "undefined") {
          CustomEase.create("_heroCustom", easeObj.value);
          ease = "_heroCustom";
        } else {
          ease = isCustom ? "power2.out" : easeObj.value;
        }

        _heroAnimEls.forEach(function(el) {
          el.style.transform = "";
          el.style.opacity = "1";
        });
        _heroAnimEls = [];

        var activeSlide = doc.querySelector(".slide.active") || doc.querySelector(".slide:first-child");
        if (!activeSlide) return;

        var ifrWin = doc.defaultView;
        var els = [];
        activeSlide.querySelectorAll("*").forEach(function(el) {
          try {
            var cs = ifrWin.getComputedStyle(el);
            if (cs.display === "none" || cs.visibility === "hidden") return;
          } catch(e) { return; }
          var rect = el.getBoundingClientRect();
          if (rect.width < 10 || rect.height < 10) return;
          var tag = el.tagName.toLowerCase();
          var isLeaf = el.children.length === 0 || tag === "img" || tag === "svg" || tag === "picture";
          var hasDirectText = false;
          for (var c = el.firstChild; c; c = c.nextSibling) {
            if (c.nodeType === 3 && c.textContent.trim().length > 0) { hasDirectText = true; break; }
          }
          if (isLeaf || hasDirectText) els.push(el);
        });

        if (els.length === 0) return;
        if (els.length > 20) els = els.slice(0, 20);
        _heroAnimEls = els;

        var tl = gsap.timeline();
        _heroAnimTimeline = tl;

        els.forEach(function(el) {
          var rect = el.getBoundingClientRect();
          gsap.set(el, { opacity: 0, x: 1920 - rect.left + 20 });
        });
        tl.to(els, {
          opacity: 1,
          x: 0,
          duration: 0.8,
          ease: ease,
          stagger: 0.08,
          delay: 0,
          onComplete: function() {
            els.forEach(function(el) {
              el.style.removeProperty("transform");
              el.style.opacity = "1";
            });
          }
        });
      }

      function tpSelectTemplate(slug) {
        var t = null;

          if (ALL_TEMPLATES[i].slug === slug) { t = ALL_TEMPLATES[i]; break; }
        }
        if (!t) return;
        var pal = tpActivePal > 0 ? PALETTES[tpActivePal] : null;
        var pick = {
          slug: slug,
          name: t.name,
          tagline: t.tagline,
          scheme: t.scheme,
          palette: pal ? {bg: pal.secondary, fg: pal.primary, accent: pal.accent, muted: pal.tertiary} : null
        };

      function handleTemplatePick(pick) {
        if (!pick || !pick.slug) return;
        window._currentTemplateSlug = pick.slug;
        _origVarCache = {};
        PROMPT.title = pick.name;
        PROMPT.headline = pick.name.toUpperCase();
        PROMPT.subline = pick.tagline;
        if (ARCHITECTURES[0]) {
          ARCHITECTURES[0].name = pick.name;
          ARCHITECTURES[0].description = pick.tagline;
          ARCHITECTURES[0].tag = pick.slug;
          ARCHITECTURES[0].mood = (pick.scheme === "dark" ? "Dark" : "Light") + " template — " + pick.tagline;
        }
        if (pick.palette) {
          var bestIdx = 0, bestDist = Infinity;
          PALETTES.forEach(function(p, i) {
            if (i === 0) return;
            var d = Math.abs(parseInt(p.secondary.slice(1,3),16) - parseInt(pick.palette.bg.slice(1,3),16))
                  + Math.abs(parseInt(p.primary.slice(1,3),16) - parseInt(pick.palette.fg.slice(1,3),16))
                  + Math.abs(parseInt(p.accent.slice(1,3),16) - parseInt(pick.palette.accent.slice(1,3),16));
            if (d < bestDist) { bestDist = d; bestIdx = i; }
          });
          overridePalette = bestIdx;
        }
        var tabMood = document.getElementById("tab-mood");
        if (tabMood) {
          tabMood.textContent = "← Template";
          tabMood.onclick = function() {
            showPhase("mood");
