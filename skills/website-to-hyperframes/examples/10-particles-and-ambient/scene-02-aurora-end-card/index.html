<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-02-aurora-end-card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06070B; }

    [data-composition-id="scene-02-aurora-end-card"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #06070B;
      font-family: "Inter", system-ui, sans-serif;
    }

    [data-composition-id="scene-02-aurora-end-card"] .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Deep radial backdrop — anchors the composition in space */
    [data-composition-id="scene-02-aurora-end-card"] .bg-deep {
      background: radial-gradient(1600px 1000px at 50% 65%, #0a0c18 0%, #06070B 55%, #030408 100%);
    }

    /* Multi-stop aurora — violet, cyan, mint, magenta */
    [data-composition-id="scene-02-aurora-end-card"] .bg-aurora {
      background:
        radial-gradient(900px 500px at 22% 38%, rgba(83, 58, 253, 0.28), transparent 65%),
        radial-gradient(1100px 700px at 78% 42%, rgba(0, 195, 255, 0.22), transparent 60%),
        radial-gradient(700px 500px at 50% 80%, rgba(62, 207, 142, 0.18), transparent 65%),
        radial-gradient(600px 400px at 80% 15%, rgba(244, 75, 204, 0.15), transparent 65%);
      filter: blur(2px);
      opacity: 0;
    }

    /* Subtle film grain — tactile texture */
    [data-composition-id="scene-02-aurora-end-card"] .bg-grain {
      background-image:
        radial-gradient(circle at 25% 35%, rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(circle at 75% 65%, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      opacity: 0.5;
    }

    /* Soft spotlight ambient — lifts the center stage */
    [data-composition-id="scene-02-aurora-end-card"] .spotlight {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: 1400px;
      height: 700px;
      background: radial-gradient(closest-side, rgba(255, 255, 255, 0.06), transparent);
      filter: blur(1px);
      opacity: 0;
      pointer-events: none;
    }

    /* Floating particles — 12 dots that twinkle in then breathe */
    [data-composition-id="scene-02-aurora-end-card"] .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    [data-composition-id="scene-02-aurora-end-card"] .pt {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #f7f8f8;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      opacity: 0;
    }
    [data-composition-id="scene-02-aurora-end-card"] .p1  { left: 12%; top: 28%; }
    [data-composition-id="scene-02-aurora-end-card"] .p2  { left: 22%; top: 72%; }
    [data-composition-id="scene-02-aurora-end-card"] .p3  { left: 35%; top: 22%; }
    [data-composition-id="scene-02-aurora-end-card"] .p4  { left: 48%; top: 82%; }
    [data-composition-id="scene-02-aurora-end-card"] .p5  { left: 58%; top: 18%; }
    [data-composition-id="scene-02-aurora-end-card"] .p6  { left: 68%; top: 72%; }
    [data-composition-id="scene-02-aurora-end-card"] .p7  { left: 78%; top: 28%; }
    [data-composition-id="scene-02-aurora-end-card"] .p8  { left: 88%; top: 62%; }
    [data-composition-id="scene-02-aurora-end-card"] .p9  { left: 18%; top: 50%; }
    [data-composition-id="scene-02-aurora-end-card"] .p10 { left: 42%; top: 38%; }
    [data-composition-id="scene-02-aurora-end-card"] .p11 { left: 62%; top: 52%; }
    [data-composition-id="scene-02-aurora-end-card"] .p12 { left: 82%; top: 40%; }

    /* Wordmark — MOTION (white) · STUDIO (tri-color gradient) */
    [data-composition-id="scene-02-aurora-end-card"] .wordmark-wrap {
      position: absolute;
      left: 0;
      right: 0;
      top: 320px;
      text-align: center;
    }
    [data-composition-id="scene-02-aurora-end-card"] .wordmark {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      font-weight: 900;
      font-size: 200px;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    [data-composition-id="scene-02-aurora-end-card"] .w-piece {
      display: inline-block;
      opacity: 0;
      filter: blur(20px);
    }
    [data-composition-id="scene-02-aurora-end-card"] .w-motion { color: #f7f8f8; }
    [data-composition-id="scene-02-aurora-end-card"] .w-studio {
      background: linear-gradient(95deg, #533afd 0%, #00c3ff 45%, #3ecf8e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Promise lines */
    [data-composition-id="scene-02-aurora-end-card"] .promise {
      position: absolute;
      left: 0;
      right: 0;
      top: 580px;
      text-align: center;
    }
    [data-composition-id="scene-02-aurora-end-card"] .promise .line {
      margin: 0 0 8px 0;
      font-family: "Inter", system-ui, sans-serif;
      font-weight: 500;
      font-size: 58px;
      letter-spacing: -0.01em;
      color: rgba(247, 248, 248, 0.9);
    }
    [data-composition-id="scene-02-aurora-end-card"] .line-inner {
      display: inline-block;
      opacity: 0;
      filter: blur(14px);
    }

    /* Install pill — frosted glass with a typed command */
    [data-composition-id="scene-02-aurora-end-card"] .install {
      position: absolute;
      left: 0;
      right: 0;
      top: 810px;
      text-align: center;
    }
    [data-composition-id="scene-02-aurora-end-card"] .install-inner {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      opacity: 0;
    }
    [data-composition-id="scene-02-aurora-end-card"] .install-cmd {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 28px;
      font-weight: 500;
      color: rgba(247, 248, 248, 0.85);
      letter-spacing: 0.005em;
      display: inline-block;
      white-space: pre;
    }
    [data-composition-id="scene-02-aurora-end-card"] .install-cmd .ch {
      display: inline-block;
      opacity: 0;
      white-space: pre;
    }
    /* Blinking cursor at the end of the typed command */
    [data-composition-id="scene-02-aurora-end-card"] .cursor {
      display: inline-block;
      width: 14px;
      height: 28px;
      vertical-align: -5px;
      margin-left: 6px;
      background: #00c3ff;
      box-shadow: 0 0 12px rgba(0, 195, 255, 0.7);
      opacity: 0;
    }

    /* Breath dot — final beat sign-off */
    [data-composition-id="scene-02-aurora-end-card"] .breath-dot {
      position: absolute;
      left: 50%;
      top: 945px;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #00c3ff;
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(0, 195, 255, 0.8);
      opacity: 0;
    }

    /* Scene label — bottom-left identifier */
    [data-composition-id="scene-02-aurora-end-card"] .scene-label {
      position: absolute;
      left: 48px;
      bottom: 36px;
      font-family: "Inter", sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #5c6c7a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 40;
    }
    [data-composition-id="scene-02-aurora-end-card"] .scene-label .accent {
      color: #d4f1ff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div
    id="scene-02-aurora-end-card"
    data-composition-id="scene-02-aurora-end-card"
    data-start="0"
    data-duration="8.0"
    data-width="1920"
    data-height="1080"
    style="width: 1920px; height: 1080px;"
  >
    <!-- Rich dark backdrop with aurora gradient -->
    <div class="bg-layer bg-deep"></div>
    <div class="bg-layer bg-aurora"></div>
    <div class="bg-layer bg-grain"></div>

    <!-- Spotlight / ambient glow -->
    <div class="spotlight"></div>

    <!-- Floating particles -->
    <div class="particles">
      <div class="pt p1"></div><div class="pt p2"></div><div class="pt p3"></div>
      <div class="pt p4"></div><div class="pt p5"></div><div class="pt p6"></div>
      <div class="pt p7"></div><div class="pt p8"></div><div class="pt p9"></div>
      <div class="pt p10"></div><div class="pt p11"></div><div class="pt p12"></div>
    </div>

    <!-- Wordmark — MOTION + tri-color STUDIO -->
    <div class="wordmark-wrap">
      <h1 class="wordmark">
        <span class="w-piece w-motion">MOTION</span><span class="w-piece w-studio">STUDIO</span>
      </h1>
    </div>

    <!-- Promise lines -->
    <div class="promise">
      <p class="line line-1"><span class="line-inner">Describe what you want.</span></p>
      <p class="line line-2"><span class="line-inner">Watch it animate itself.</span></p>
    </div>

    <!-- Install pill — typed command + blinking cursor -->
    <div class="install">
      <div class="install-inner">
        <span class="install-cmd" id="install-cmd"></span><span class="cursor" id="cursor"></span>
      </div>
    </div>

    <!-- Sign-off accent dot — breathes in final beat -->
    <div class="breath-dot"></div>

    <div class="scene-label">
      Scene 02 · <span class="accent">Aurora End Card</span> · radial gradient + 12 floating particles + multi-color text gradient + typing cursor
    </div>
  </div>

  <script>
    (function () {
      var COMP_ID = "scene-02-aurora-end-card";
      var root = document.querySelector('[data-composition-id="' + COMP_ID + '"]');
      var aurora = root.querySelector(".bg-aurora");
      var spotlight = root.querySelector(".spotlight");
      var particles = root.querySelectorAll(".pt");
      var wMotion = root.querySelector(".w-motion");
      var wStudio = root.querySelector(".w-studio");
      var line1 = root.querySelector(".line-1 .line-inner");
      var line2 = root.querySelector(".line-2 .line-inner");
      var install = root.querySelector(".install-inner");
      var installCmd = root.querySelector("#install-cmd");
      var cursor = root.querySelector("#cursor");
      var breathDot = root.querySelector(".breath-dot");

      // Pre-split the install command into per-character spans so GSAP can type it on.
      // We build via createElement/textContent (no innerHTML) — content is a fixed literal.
      var CMD_TEXT = "npx create-motion-studio";
      // Clear any pre-existing children safely
      while (installCmd.firstChild) installCmd.removeChild(installCmd.firstChild);
      var chars = [];
      for (var i = 0; i < CMD_TEXT.length; i++) {
        var s = document.createElement("span");
        s.className = "ch";
        s.textContent = CMD_TEXT[i];
        installCmd.appendChild(s);
        chars.push(s);
      }

      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // 0.0 - 1.4s: Aurora + spotlight bloom in
      tl.to(aurora, { opacity: 0.85, duration: 1.2, ease: "power2.out" }, 0.0);
      tl.to(spotlight, { opacity: 1, duration: 1.4, ease: "power2.out" }, 0.2);

      // 0.3 - 1.1s: Particles twinkle in (random stagger)
      tl.to(particles, {
        opacity: 0.85,
        duration: 0.8,
        stagger: { each: 0.06, from: "random" },
        ease: "power2.out",
      }, 0.3);

      // Each particle breathes — opacity + tiny y drift — across the remaining duration
      particles.forEach(function (p, i) {
        var delay = 0.5 + (i % 5) * 0.4;
        var cycleDur = 2.0 + (i % 3) * 0.5;
        var totalLeft = 8.0 - delay;
        var repeats = Math.max(0, Math.floor(totalLeft / cycleDur) - 1);
        tl.to(p, {
          opacity: 0.3,
          y: "+=6",
          duration: cycleDur,
          ease: "sine.inOut",
          repeat: repeats,
          yoyo: true,
        }, delay);
      });

      // 0.9 - 2.05s: Wordmark — blur-to-sharp reveal, two pieces
      tl.to(wMotion, { opacity: 1, filter: "blur(0px)", duration: 0.85, ease: "power2.out" }, 0.9);
      tl.to(wStudio, { opacity: 1, filter: "blur(0px)", duration: 0.85, ease: "power2.out" }, 1.20);

      // 2.4 - 3.2s: Line 1 reveals
      tl.to(line1, { opacity: 1, filter: "blur(0px)", duration: 0.8, ease: "power2.out" }, 2.4);

      // 3.3 - 4.1s: Line 2 reveals
      tl.to(line2, { opacity: 1, filter: "blur(0px)", duration: 0.8, ease: "power2.out" }, 3.3);

      // 4.8s: Install pill frame fades in
      tl.to(install, { opacity: 1, duration: 0.5, ease: "power2.out" }, 4.8);

      // 5.0s: Cursor appears
      tl.to(cursor, { opacity: 1, duration: 0.15, ease: "none" }, 5.0);
      // Blink the cursor — steps(1) gives a hard on/off
      tl.to(cursor, {
        opacity: 0,
        duration: 0.5,
        ease: "steps(1)",
        repeat: 5,
        yoyo: true,
      }, 5.15);

      // 5.05 - ~6.25s: Type the command character-by-character
      tl.to(chars, {
        opacity: 1,
        duration: 0.01,
        ease: "steps(1)",
        stagger: 0.045,
      }, 5.05);

      // 6.0s: Breath dot bursts in
      tl.fromTo(breathDot,
        { opacity: 0, scale: 0 },
        { opacity: 0.9, scale: 1.0, duration: 0.5, ease: "back.out(2)" },
        6.0
      );
      // 6.5s: Dot pulses — scale + opacity yoyo
      tl.to(breathDot, {
        scale: 1.5,
        opacity: 0.5,
        duration: 0.8,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
      }, 6.5);

      // Wordmark subtle breath through the rest of the scene
      tl.to([wMotion, wStudio], {
        scale: 1.01,
        duration: 3.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
        transformOrigin: "50% 50%",
      }, 1.8);

      // Aurora drifts — continuous slow parallax
      tl.to(aurora, {
        x: "+=40",
        y: "-=20",
        duration: 7.5,
        ease: "sine.inOut",
      }, 0.2);

      window.__timelines[COMP_ID] = tl;
    })();
  </script>
</body>
</html>
